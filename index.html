<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STAR Z - Mining Farm</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Adsgram !== 'undefined') {
                window.AdBlock1 = Adsgram.init({ blockId: "int-27339" });
                window.AdBlock2 = Adsgram.init({ blockId: "27338" });
            }
        });
    </script>
</head>
<body>
    <div class="sky-overlay"></div>
    <div class="farm-background"></div>
    
    <div id="app-loader">
        <div class="loading-container">
            <div class="loading-logo">
                <img src="https://i.ibb.co/XxXhyZYf/file-000000006f8c720e9ab4c76b6e560062.png" alt="STAR Z" class="loading-logo-img">
            </div>
            <div class="loading-steps">
                <div class="loading-step"><i class="fas fa-spinner fa-pulse"></i><span>Loading App Data...</span></div>
                <div class="loading-step"><i class="fas fa-spinner fa-pulse"></i><span>Loading User Data...</span></div>
                <div class="loading-step"><i class="fas fa-spinner fa-pulse"></i><span>Checking User Status...</span></div>
                <div class="loading-step"><i class="fas fa-spinner fa-pulse"></i><span>Loading Plans...</span></div>
                <div class="loading-step"><i class="fas fa-spinner fa-pulse"></i><span>App Loading...</span></div>
            </div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <header class="app-header">
            <div class="header-top">
                <div class="user-info">
                    <img id="user-photo" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png" alt="User">
                    <span id="user-name" class="user-name">User</span>
                </div>
                <button id="theme-toggle" class="theme-toggle-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
        
        <main id="main-content">
            <div id="home-page" class="page active"></div>
            <div id="plans-page" class="page"></div>
            <div id="tasks-page" class="page"></div>
            <div id="team-page" class="page"></div>
            <div id="profile-page" class="page"></div>
        </main>
          
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home-page"><i class="fas fa-home"></i><span>Home</span></button>
            <button class="nav-btn" data-page="plans-page"><i class="fas fa-chart-line"></i><span>Plans</span></button>
            <button class="nav-btn" data-page="tasks-page"><i class="fas fa-coins"></i><span>Earn</span></button>
            <button class="nav-btn" data-page="team-page"><i class="fas fa-users"></i><span>Team</span></button>
            <button class="nav-btn" data-page="profile-page"><i class="fas fa-user"></i><span>Me</span></button>
        </nav>
    </div>

    <style>
        .sky-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            transition: background 0.3s ease;
        }
        .farm-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: repeating-linear-gradient(45deg, rgba(76, 175, 80, 0.05) 0px, rgba(76, 175, 80, 0.05) 2px, transparent 2px, transparent 8px);
        }
        .loading-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 30px;
            animation: pulse-scale 2s infinite ease-in-out;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
        .loading-logo-img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes pulse-scale {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1a0f, #0d2a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .error-content {
            text-align: center;
            padding: 30px;
            background: rgba(30, 50, 35, 0.95);
            border-radius: 28px;
            margin: 20px;
            max-width: 320px;
        }
        .reload-btn {
            background: linear-gradient(135deg, #2ecc71, #1e8449);
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .theme-toggle-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }
    </style>

    <script type="module" src="js/app.js"></script>
</body>
</html>
