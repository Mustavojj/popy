<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>POP BUZZ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Adsgram !== 'undefined') {
                window.AdBlock2 = Adsgram.init({ blockId: "25805" });
                window.AdBlock1 = Adsgram.init({ blockId: "int-25806" });
            }
        });
    </script>
</head>
<body>
    
    <div class="app-background"></div>
    
    <div id="app-loader" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a1428;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    ">
        <div class="loading-container" style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 90%;
            max-width: 380px;
        ">
            <div style="
                width: 100px;
                height: 100px;
                border-radius: 50%;
                overflow: hidden;
                margin-bottom: 30px;
                animation: pulse-scale 2s infinite ease-in-out;
                border: 2px solid #FFD966;
                box-shadow: 0 0 20px rgba(255, 217, 102, 0.5);
            ">
                <img src="https://i.ibb.co/gLb6qFhn/file-00000000473871f4b2902b2708daa633.png" 
                     alt="POP BUZZ" 
                     style="
                        width: 100%;
                        height: 100%;
                        object-fit: cover;
                        border-radius: 50%;
                     "
                     oncontextmenu="return false;" 
                     ondragstart="return false;">
            </div>
            
            <div class="loading-steps" style="width: 100%; margin-top: 10px; background: rgba(26,38,58,0.9); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,217,102,0.2);">
                <div class="loading-step" style="color: #FFD966; margin: 8px 0; font-size: 14px; text-align: left; padding: 12px 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #FFD966; display: flex; align-items: center;">
                    <i class="fas fa-spinner fa-pulse" style="color: #FFD966; margin-right: 12px; width: 20px;"></i>
                    <span>Loading App Data...</span>
                </div>
                <div class="loading-step" style="color: #FFD966; margin: 8px 0; font-size: 14px; text-align: left; padding: 12px 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #FFD966; display: flex; align-items: center;">
                    <i class="fas fa-spinner fa-pulse" style="color: #FFD966; margin-right: 12px; width: 20px;"></i>
                    <span>Loading User Data...</span>
                </div>
                <div class="loading-step" style="color: #FFD966; margin: 8px 0; font-size: 14px; text-align: left; padding: 12px 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #FFD966; display: flex; align-items: center;">
                    <i class="fas fa-spinner fa-pulse" style="color: #FFD966; margin-right: 12px; width: 20px;"></i>
                    <span>Checking User Status...</span>
                </div>
                <div class="loading-step" style="color: #FFD966; margin: 8px 0; font-size: 14px; text-align: left; padding: 12px 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #FFD966; display: flex; align-items: center;">
                    <i class="fas fa-spinner fa-pulse" style="color: #FFD966; margin-right: 12px; width: 20px;"></i>
                    <span>Loading Tasks...</span>
                </div>
                <div class="loading-step" style="color: #FFD966; margin: 8px 0; font-size: 14px; text-align: left; padding: 12px 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #FFD966; display: flex; align-items: center;">
                    <i class="fas fa-spinner fa-pulse" style="color: #FFD966; margin-right: 12px; width: 20px;"></i>
                    <span>App Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <style>
        .launch-btn {
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            color: #0a1428;
            font-weight: bold;
            font-size: 18px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 217, 102, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            max-width: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.5s ease;
        }
        
        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 217, 102, 0.4);
        }
        
        @keyframes pulse-scale {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading-step {
            transition: all 0.3s ease;
        }
        
        .loading-step i {
            transition: color 0.3s ease;
        }
        
        .banned-card {
            background: linear-gradient(135deg, #1a263a 0%, #0f172a 100%);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(244, 67, 54, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 320px;
            margin: 20px auto;
        }
        
        .banned-icon {
            font-size: 64px;
            color: #f44336;
            margin-bottom: 20px;
        }
        
        .banned-card h2 {
            color: #f44336;
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .banned-card p {
            color: #e0e0e0;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        
        .close-app-btn {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .close-app-btn:hover {
            transform: translateY(-2px);
        }
    </style>

    <div id="app" style="display: none;">
        <header class="app-header">
            <div class="profile-card">
                <div class="profile-content">
                    <div class="profile-left">
                        <div class="user-avatar-container">
                            <img id="user-photo" class="user-avatar" 
                                 src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png" 
                                 alt="User" 
                                 oncontextmenu="return false;" 
                                 ondragstart="return false;">
                        </div>
                         <div class="user-info-left">
                            <h2 id="user-name" class="user-name">User</h2>
                         </div>
                    </div>
                </div>
            </div>
        </header>
        
        <main id="main-content">
            <div id="tasks-page" class="page"></div>
            <div id="referrals-page" class="page"></div>
            <div id="profile-page" class="page"></div>
        </main>
          
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="tasks-page">
                <i class="fas fa-coins"></i>
                <span>Earn</span>
            </button>
            <button class="nav-btn" data-page="referrals-page">
                <i class="fas fa-user-plus"></i>
                <span>Invite</span>
            </button>
            <button class="nav-btn user-photo-btn" data-page="profile-page">
                <img id="bottom-nav-user-photo" 
                     src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png" 
                     alt="Profile"
                     oncontextmenu="return false;" 
                     ondragstart="return false;">
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <script type="module" src="js/app.js"></script>
    
    <script>
        (function() {
            'use strict';
            
            function showError() {
                document.body.innerHTML = `
                    <div class="telegram-error">
                        <div class="error-content">
                            <div class="error-header">
                                <div class="error-icon">
                                    <i class="fab fa-telegram"></i>
                                </div>
                                <h2>POP BUZZ</h2>
                            </div>
                            
                            <div class="error-message">
                                <div class="error-icon-wrapper">
                                    <i class="fas fa-exclamation-triangle"></i>
                                </div>
                                <h3>Access Denied</h3>
                                <p>This application works only inside Telegram.</p>
                            </div>
                            
                            <a href="https://t.me/Tornado_Rbot" target="_blank" class="telegram-btn">
                                <i class="fab fa-telegram"></i> Open in Telegram
                            </a>
                        </div>
                    </div>
                `;
            }
            
            function verify() {
                if (!window.Telegram || !window.Telegram.WebApp) return false;
                
                const tg = window.Telegram.WebApp;
                if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) return false;
                
                const user = tg.initDataUnsafe.user;
                if (!user.id || typeof user.id !== 'number' || user.id <= 0) return false;
                if (!user.first_name || user.first_name.trim().length === 0) return false;
                if (!tg.initData || tg.initData.length < 10) return false;
                
                return true;
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                if (!window.Telegram || !window.Telegram.WebApp) {
                    showError();
                    return;
                }
            });
            
        })();
    </script>
</body>
</html>
