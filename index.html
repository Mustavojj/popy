<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Star Farmer - Mining Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Adsgram !== 'undefined') {
                window.AdBlock1 = Adsgram.init({ blockId: "int-27339" });
                window.AdBlock2 = Adsgram.init({ blockId: "27338" });
            }
        });
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app-loader">
        <div class="loader-container">
            <img src="https://i.ibb.co/XxXhyZYf/file-000000006f8c720e9ab4c76b6e560062.png" class="loader-logo">
            <div class="loader-text">Loading<span class="dots">...</span></div>
            <div class="loader-error" id="loader-error" style="display:none;"></div>
        </div>
    </div>
    <div id="app" style="display:none;">
        <header class="app-header">
            <div class="header-top">
                <div class="user-info">
                    <img id="user-photo" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png">
                    <div class="user-details">
                        <span id="user-name" class="user-name">User</span>
                        <div class="user-level"><i class="fas fa-crown"></i> Level <span id="user-level">1</span></div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="support-btn" class="header-icon-btn"><i class="fas fa-headset"></i></button>
                    <button id="settings-btn" class="header-icon-btn"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </header>
        <main id="main-content">
            <div id="home-page" class="page active"></div>
            <div id="plans-page" class="page"></div>
            <div id="tasks-page" class="page"></div>
            <div id="team-page" class="page"></div>
            <div id="profile-page" class="page"></div>
        </main>
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home-page"><i class="fas fa-home"></i><span>Home</span></button>
            <button class="nav-btn" data-page="plans-page"><i class="fas fa-microchip"></i><span>Mining</span></button>
            <button class="nav-btn" data-page="tasks-page"><i class="fas fa-tasks"></i><span>Tasks</span></button>
            <button class="nav-btn" data-page="team-page"><i class="fas fa-users"></i><span>Team</span></button>
            <button class="nav-btn" data-page="profile-page"><i class="fas fa-user"></i><span>Profile</span></button>
        </nav>
    </div>
    <div id="settings-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-sliders-h"></i> Settings</h3>
                <button class="modal-close" id="close-settings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <span><i class="fas fa-globe"></i> Language</span>
                    <select id="language-select">
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                        <option value="ru">Русский</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span><i class="fas fa-volume-up"></i> Sound Effects</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span><i class="fas fa-vibration"></i> Vibration</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="vibration-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
    <div id="tasks-info-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> About Tasks</h3>
                <button class="modal-close" id="close-tasks-info">&times;</button>
            </div>
            <div class="modal-body">
                <p><i class="fas fa-plus-circle"></i> You can add your own tasks by contacting support</p>
                <p><i class="fas fa-handshake"></i> Partnership opportunities available for large communities</p>
                <p><i class="fas fa-check-circle"></i> Each completed task gives you XP to increase your level</p>
                <p><i class="fas fa-star"></i> Higher level = higher mining rewards</p>
                <button id="contact-support-btn" class="support-modal-btn"><i class="fas fa-headset"></i> Contact Support</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
