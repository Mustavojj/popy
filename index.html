<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POP BUZZ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Adsgram !== 'undefined') {
                window.AdBlock2 = Adsgram.init({ blockId: "25805" });
                window.AdBlock1 = Adsgram.init({ blockId: "int-25806" });
            }
        });
    </script>
</head>
<body>
    
    <div class="app-background"></div>
    
    <div id="app-loader">
        <div class="loading-container">
            <div class="loading-logo">
                <img src="https://i.ibb.co/gLb6qFhn/file-00000000473871f4b2902b2708daa633.png" 
                     alt="POP BUZZ" 
                     class="loading-logo-img"
                     oncontextmenu="return false;" 
                     ondragstart="return false">
            </div>
            
            <div class="loading-steps">
                <div class="loading-step">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <span>Loading App Data...</span>
                </div>
                <div class="loading-step">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <span>Loading User Data...</span>
                </div>
                <div class="loading-step">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <span>Checking User Status...</span>
                </div>
                <div class="loading-step">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <span>Loading Tasks...</span>
                </div>
                <div class="loading-step">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <span>App Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <header class="app-header">
            <div class="profile-card">
                <div class="profile-content">
                    <div class="profile-left">
                        <div class="user-avatar-container">
                            <img id="user-photo" class="user-avatar" 
                                 src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png" 
                                 alt="User" 
                                 oncontextmenu="return false;" 
                                 ondragstart="return false">
                        </div>
                        <div class="user-info-left">
                            <h2 id="user-name" class="user-name">User</h2>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        
        <main id="main-content">
            <div id="tasks-page" class="page"></div>
            <div id="referrals-page" class="page"></div>
            <div id="profile-page" class="page"></div>
        </main>
          
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="tasks-page">
                <i class="fas fa-coins"></i>
                <span>Earn</span>
            </button>
            <button class="nav-btn" data-page="referrals-page">
                <i class="fas fa-user-plus"></i>
                <span>Invite</span>
            </button>
            <button class="nav-btn user-photo-btn" data-page="profile-page">
                <img id="bottom-nav-user-photo" 
                     src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png" 
                     alt="Profile"
                     oncontextmenu="return false;" 
                     ondragstart="return false">
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <style>
        .loading-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 30px;
            animation: pulse-scale 2s infinite ease-in-out;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
        
        .loading-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        @keyframes pulse-scale {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1a0f, #0d2a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .error-content {
            text-align: center;
            padding: 30px;
            background: rgba(30, 50, 35, 0.95);
            border-radius: 28px;
            margin: 20px;
            max-width: 320px;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        
        .error-icon {
            font-size: 48px;
            color: #2ecc71;
            margin-bottom: 15px;
        }
        
        .error-content h2 {
            color: #2ecc71;
            margin-bottom: 15px;
        }
        
        .error-content p {
            color: #d5f5e3;
            margin: 10px 0;
        }
        
        .reload-btn {
            background: linear-gradient(135deg, #2ecc71, #1e8449);
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>

    <script type="module" src="js/app.js"></script>
    
    <script>
        (function() {
            'use strict';
            
            function showError() {
                document.body.innerHTML = `
                    <div class="error-container">
                        <div class="error-content">
                            <div class="error-icon">
                                <i class="fab fa-telegram"></i>
                            </div>
                            <h2>POP BUZZ</h2>
                            <p>Please open from Telegram Mini App</p>
                            <button onclick="window.location.reload()" class="reload-btn">
                                <i class="fas fa-redo"></i> Reload
                            </button>
                        </div>
                    </div>
                `;
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                if (!window.Telegram || !window.Telegram.WebApp) {
                    showError();
                    return;
                }
            });
        })();
    </script>
</body>
</html>
