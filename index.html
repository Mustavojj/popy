<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Star Farmer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Adsgram !== 'undefined') {
                window.AdBlock1 = Adsgram.init({ blockId: "int-27339" });
                window.AdBlock2 = Adsgram.init({ blockId: "27338" });
            }
        });
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="sun-moon" id="sun-moon"></div>
    <div class="sky-layer"></div>
    <div class="farm-layer"></div>
    <div id="app-loader">
        <div class="loader-container">
            <img src="https://i.ibb.co/XxXhyZYf/file-000000006f8c720e9ab4c76b6e560062.png" class="loader-logo">
            <div class="loader-text">Loading<span class="dots">...</span></div>
            <div class="loader-error" id="loader-error" style="display:none;"></div>
        </div>
    </div>
    <div id="app" style="display:none;">
        <header class="app-header">
            <div class="header-top">
                <div class="user-info">
                    <img id="user-photo" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/9195/9195920.png">
                    <span id="user-name" class="user-name">User</span>
                </div>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </div>
        </header>
        <main id="main-content">
            <div id="home-page" class="page active"></div>
            <div id="plans-page" class="page"></div>
            <div id="tasks-page" class="page"></div>
            <div id="team-page" class="page"></div>
            <div id="profile-page" class="page"></div>
        </main>
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home-page"><i class="fas fa-home"></i><span>Farm</span></button>
            <button class="nav-btn" data-page="plans-page"><i class="fas fa-tractor"></i><span>Plans</span></button>
            <button class="nav-btn" data-page="tasks-page"><i class="fas fa-seedling"></i><span>Earn</span></button>
            <button class="nav-btn" data-page="team-page"><i class="fas fa-users"></i><span>Team</span></button>
            <button class="nav-btn" data-page="profile-page"><i class="fas fa-user"></i><span>Me</span></button>
        </nav>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
    </html>
